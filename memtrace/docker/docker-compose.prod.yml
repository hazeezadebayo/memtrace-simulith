services:
  memtrace:
    image: ghcr.io/hazeezadebayo/memtrace-simulith:latest
    container_name: memtrace
    ports:
      - "${HOST_PORT:-3000}:3106"
    env_file:
      - .env
    volumes:
      - memtrace_data:/app/data
    restart: unless-stopped
    stop_grace_period: 30s
    mem_limit: ${MEM_LIMIT:-700m}
    mem_reservation: ${MEM_RESERVE:-400m}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3106/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: memtrace_cloudflared
    restart: unless-stopped
    env_file:
      - .env
    command: tunnel --no-autoupdate run --token $CLOUDFLARE_TUNNEL_TOKEN
    depends_on:
      - memtrace

volumes:
  memtrace_data:
    driver: local
