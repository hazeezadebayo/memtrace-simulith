<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Threadlet AI</title>
  <link href="https://rsms.me/inter/inter.css" rel="stylesheet" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Baskervville:ital@0;1&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Crimson+Pro:wght@400;600;700&display=swap');

    :root {
      --bg-main: #FAFAFA;
      --bg-console: #121212;
      --accent-orange: #FF6B1A;
      --accent-green: #43C165;
      --text-dark: #1A1A1A;
      --text-secondary: #555555;
      --border-width: 3px;
      --border-color: #000000;
      --font-serif: 'Baskervville', 'Crimson Pro', serif;
      --font-mono: 'Space Mono', monospace;
    }

    body {
      font-family: var(--font-serif);
      margin: 0;
      padding: 12px;
      width: 100%;
      box-sizing: border-box;
      background: var(--bg-main);
      color: var(--text-dark);
    }

    body.dark-mode {
      background: var(--bg-console);
      color: #FFF;
      --border-color: #FFF;
    }

    h3,
    h4 {
      font-family: var(--font-serif);
      font-weight: 700;
      text-transform: uppercase;
      margin: 0 0 8px;
    }

    .small {
      font-family: var(--font-mono);
      font-size: .75em;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    body.dark-mode .small {
      color: #AAA;
    }

    .theme-toggle {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      width: 100%;
      gap: 8px;
      margin-bottom: 12px;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      cursor: pointer;
    }

    .theme-switch {
      position: relative;
      width: 40px;
      height: 20px;
      border: 2px solid var(--border-color);
      background: #FFF;
    }

    body.dark-mode .theme-switch {
      background: #333;
    }

    .theme-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      transition: .2s;
    }

    .slider:before {
      content: "";
      position: absolute;
      width: 12px;
      height: 12px;
      left: 2px;
      bottom: 2px;
      background: var(--border-color);
      transition: .2s;
    }

    .theme-switch input:checked+.slider {
      background: var(--accent-orange);
    }

    .theme-switch input:checked+.slider:before {
      transform: translateX(20px);
      background: #000;
    }

    .top-toggle {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
    }

    .toggle-btn {
      flex: 1;
      padding: 6px;
      border: 2px solid var(--border-color);
      background: #FFF;
      color: var(--text-dark);
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 0.75rem;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 2px 2px 0px var(--border-color);
      transition: transform 0.1s;
    }

    body.dark-mode .toggle-btn {
      background: #222;
      color: #FFF;
    }

    .toggle-btn:hover {
      transform: translate(-1px, -1px);
      box-shadow: 3px 3px 0px var(--border-color);
    }

    .toggle-btn.active {
      background: var(--accent-green);
      color: #000;
      box-shadow: 0 0 0 transparent;
      transform: translate(2px, 2px);
    }

    .section {
      background: #FFF;
      padding: 12px;
      border: 2px solid var(--border-color);
      box-shadow: 4px 4px 0px var(--border-color);
      margin-top: 12px;
    }

    body.dark-mode .section {
      background: #1A1A1A;
      box-shadow: 4px 4px 0px var(--border-color);
    }

    .preview {
      max-height: 300px;
      overflow: auto;
      padding: 8px;
      background: var(--bg-main);
      border: 2px solid var(--border-color);
      word-break: break-word;
      font-family: var(--font-serif);
      font-size: 0.9em;
    }

    #files-list.preview {
      max-height: calc(100vh - 120px);
      min-height: 360px;
    }

    #search-results-list.preview {
      max-height: 270px;
    }

    body.dark-mode .preview {
      background: #2A2A2A;
    }

    input[type="text"], textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border: 2px solid var(--border-color);
      font-family: var(--font-mono);
      background: #FFF;
      margin-bottom: 8px;
      outline: none;
      resize: vertical;
    }

    input[type="text"]:focus, textarea:focus {
      background: #F0FFF0;
      border-color: var(--accent-green);
    }

    body.dark-mode input[type="text"], body.dark-mode textarea {
      background: #333;
      color: #FFF;
    }

    button.primary {
      width: 100%;
      padding: 10px;
      background: var(--text-dark);
      color: #FFF;
      border: 2px solid var(--border-color);
      font-family: var(--font-mono);
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 3px 3px 0px var(--accent-orange);
      transition: all 0.1s;
    }

    button.primary:hover {
      transform: translate(2px, 2px);
      box-shadow: 0 0 0 transparent;
    }

    #progress-container {
      position: relative;
      height: 8px;
      background: #FFF;
      border: 2px solid var(--border-color);
      margin-top: 8px;
    }

    #progress {
      height: 100%;
      width: 0%;
      background: var(--accent-orange);
      transition: width .3s;
    }

    .item,
    .result-item,
    .chunk-item {
      padding: 8px 0;
      border-bottom: 2px dashed var(--border-color);
      margin-bottom: 4px;
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 4px;
      margin-bottom: 4px;
    }

    .header-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
      min-width: 0;
    }

    .header-top {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .score-badge {
      font-family: var(--font-mono);
      font-size: 0.75em;
      font-weight: 700;
      background: var(--accent-orange);
      color: #000;
      padding: 2px 4px;
      border: 1px solid var(--border-color);
    }

    .chunk-id {
      font-family: var(--font-mono);
      font-size: 0.85em;
      font-weight: 700;
      color: var(--text-dark);
    }

    body.dark-mode .chunk-id {
      color: #FFF;
    }

    .ref-id {
      font-family: var(--font-mono);
      font-size: 0.7em;
      color: var(--text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    body.dark-mode .ref-id {
      color: #AAA;
    }

    .header-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .result-summary,
    .chunk-sum {
      margin-top: 4px;
      font-size: 0.9em;
      word-break: break-word;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    .result-tags {
      margin-top: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .result-tags .tag {
      background: #EEE;
      border: 1px solid var(--border-color);
      padding: 2px 4px;
      font-family: var(--font-mono);
      font-size: 0.65em;
      text-transform: uppercase;
    }

    body.dark-mode .result-tags .tag {
      background: #333;
      color: #FFF;
    }

    .img-btn,
    .copy-btn,
    .edit-btn,
    .save-btn,
    .cancel-btn {
      font-family: var(--font-mono);
      font-size: 0.65em;
      text-transform: uppercase;
      padding: 2px 6px;
      background: #FFF;
      color: var(--text-dark);
      border: 2px solid var(--border-color);
      cursor: pointer;
      box-shadow: 2px 2px 0px var(--border-color);
      transition: all 0.1s;
    }

    body.dark-mode .img-btn,
    body.dark-mode .copy-btn,
    body.dark-mode .edit-btn,
    body.dark-mode .save-btn,
    body.dark-mode .cancel-btn {
      background: #222;
      color: #FFF;
    }

    .img-btn:hover,
    .copy-btn:hover,
    .edit-btn:hover,
    .save-btn:hover,
    .cancel-btn:hover {
      transform: translate(1px, 1px);
      box-shadow: 1px 1px 0px var(--border-color);
    }

    .cancel-btn {
      background: var(--accent-orange) !important;
      color: #000 !important;
    }

    #search-summary-panel {
      background: #FFF;
      border: 2px solid var(--border-color);
      box-shadow: 4px 4px 0px var(--accent-orange);
      padding: 10px;
      padding-top: 32px;
      font-size: 0.9em;
      position: relative;
      display: none;
      margin-bottom: 16px;
      max-height: 135px;
      overflow-y: auto;
    }

    body.dark-mode #search-summary-panel {
      background: #222;
    }

    .summary-actions {
      position: absolute;
      top: 4px;
      right: 4px;
      display: flex;
      gap: 4px;
    }

    .summary-actions button {
      font-size: 0.65em;
      display: none;
    }

    #toast-container {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 90%;
      pointer-events: none;
    }

    .toast {
      background: var(--accent-green) !important;
      color: #000;
      border: 2px solid var(--border-color);
      padding: 8px 16px;
      font-family: var(--font-mono);
      font-size: 0.75em;
      font-weight: 700;
      text-transform: uppercase;
      text-align: center;
      box-shadow: 4px 4px 0px var(--border-color);
      opacity: 0;
      transform: translateY(10px);
      transition: 0.3s;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .ref-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }

    .ref-head a {
      color: var(--accent-orange);
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 0.75em;
      text-decoration: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .ref-head small {
      font-family: var(--font-mono);
      font-size: 0.65em;
      color: var(--text-secondary);
    }

    .hidden {
      display: none;
    }

    #confirm-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 10000;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: 0.2s;
    }

    #confirm-modal.show {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: #FFF;
      padding: 16px;
      border: 3px solid #000;
      box-shadow: 6px 6px 0 #000;
      width: 80%;
      max-width: 260px;
      text-align: center;
    }

    body.dark-mode .modal-content {
      background: #222;
      border-color: #FFF;
      box-shadow: 6px 6px 0 #FFF;
      color: #FFF;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .modal-btn {
      flex: 1;
      padding: 8px;
      font-family: var(--font-mono);
      font-weight: 700;
      text-transform: uppercase;
      border: 2px solid #000;
      cursor: pointer;
      box-shadow: 3px 3px 0 #000;
    }

    body.dark-mode .modal-btn {
      border-color: #FFF;
      box-shadow: 3px 3px 0 #FFF;
    }

    .btn-cancel {
      background: #FFF;
      color: #000;
    }

    .btn-confirm {
      background: var(--accent-orange);
      color: #000;
    }
  </style>
</head>

<body>
  <!-- ... (styles remain same) ... -->

  <div class="top-toggle">
    <button id="btn-summarizer" class="toggle-btn active">Summarizer</button>
    <button id="btn-search" class="toggle-btn">Search</button>
    <button id="btn-files" class="toggle-btn">Files</button>
  </div>

  <div id="tab-summarizer">
    <div class="section">
      <h4 style="font-size: 0.8em; margin-bottom: 4px;">Manual Ingest</h4>
      <div style="margin-top: 10px; border-top: 1px dashed var(--border-color); padding-top: 10px;">
        <textarea id="manual-ingest-text" placeholder="Paste content here..." maxlength="50000" style="min-height: 80px;"></textarea>
        <button id="btn-ingest-text" class="primary" style="font-size: 0.8em; padding: 6px;">Ingest Text</button>
      </div>

      <div id="progress-container" class="hidden">
        <div id="progress"></div>
      </div>
      <div id="progress-text" class="small hidden"></div>
    </div>
    <div id="live-preview-section" class="section hidden">
      <h4>Live Preview</h4>
      <div id="results" class="preview"></div>
    </div>
  </div>

  <div id="tab-search" class="hidden">
    <div class="section">

      <input type="text" id="search-query" placeholder="Query…"
        style="width:100%; padding:8px; border-radius:6px; border:1px solid #cfcfcf; margin-bottom:8px;" />
      <button id="btn-search-query" class="primary">Search</button>
    </div>
    <div id="search-results-section" class="section hidden">
      <h4>Results</h4>
      <div id="search-results-container">
        <div id="search-summary-panel">
          <div id="search-summary-text"></div>
          <div class="summary-actions">
            <button id="search-summary-copy">Copy</button>
            <button id="search-summary-img">Img</button>
          </div>
        </div>
        <div id="search-results-list" class="preview"></div>
      </div>
    </div>
  </div>

  <div id="tab-files" class="hidden">
    <div class="section">

      <div id="files-list" class="preview"></div>
    </div>
  </div>

  <div id="toast-container"></div>

  <!-- Custom Confirmation Modal -->
  <div id="confirm-modal">
    <div class="modal-content">
      <div id="confirm-message">Are you sure?</div>
      <div class="modal-buttons">
        <button id="confirm-cancel" class="modal-btn btn-cancel">Cancel</button>
        <button id="confirm-ok" class="modal-btn btn-confirm">Delete</button>
      </div>
    </div>
  </div>

  <script>
    // Shim for Chrome APIs when running as a web app iframe instead of an extension
    if (!window.chrome) window.chrome = {};
    if (!window.chrome.tabs) {
      window.chrome.tabs = {
        query: async () => [{ url: window.location.href, id: 'workspace-tab' }],
        sendMessage: (id, msg, handler) => { if (handler) handler({ success: false, error: 'Please use the Bookmarklet to extract content from other pages.' }); }
      };
    }
    if (!window.chrome.storage) {
      window.chrome.storage = {
        local: {
          get: async (key) => {
            if (typeof key === 'string') return { [key]: localStorage.getItem(key) };
            return {};
          },
          set: async (obj) => {
            for (const [k, v] of Object.entries(obj)) {
              localStorage.setItem(k, v);
            }
          }
        }
      };
    }
    if (!window.chrome.runtime) {
      window.chrome.runtime = {
        getURL: (path) => '/extension/' + path,
        lastError: null,
        sendMessage: (msg, handler) => {
          if (msg && msg.action === 'download') {
            const blob = new Blob([msg.log], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = msg.filename || 'download.json';
            a.click();
            URL.revokeObjectURL(url);
            if (handler) handler({ success: true });
            return;
          }
          if (handler) handler({ success: false });
        }
      };
    }
    if (!window.chrome.scripting) {
      window.chrome.scripting = {
        executeScript: (opts, cb) => { if (cb) cb(); }
      };
    }
  </script>
  <script type="module" src="popup.js"></script>
</body>

</html>
