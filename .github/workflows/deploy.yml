# =============================================================================
# MemTrace — Automatic Deploy to Alibaba Cloud SAS
# =============================================================================
# Trigger: push to main → build Docker → push to GHCR → deploy to SAS
#
# Setup (one-time):
#   1. Generate an SSH key:  ssh-keygen -t ed25519 -f ~/.ssh/memtrace_deploy -N ""
#   2. Add pubkey to SAS:    ssh-copy-id -i ~/.ssh/memtrace_deploy.pub root@<SAS_IP>
#   3. In GitHub repo → Settings → Secrets and variables → Actions, add:
#      - SAS_HOST                — your SAS public IP
#      - SAS_USER                — root
#      - SAS_SSH_KEY             — content of ~/.ssh/memtrace_deploy (private key!)
#      - QWEN_API_KEY            — your Qwen DashScope API key
#      - GOOGLE_CLIENT_ID         — from Google Cloud Console → APIs & Services → Credentials
#      - CLOUDFLARE_TUNNEL_TOKEN  — from Cloudflare Zero Trust → Networks → Tunnels
# =============================================================================

name: Deploy to Alibaba SAS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Patch: strip native modules from package.json ─────────────────
      # node-llama-cpp compiles C++ at install time, needs ~1GB+ RAM.
      # We use Qwen cloud API, so this is dead weight. Stripping it
      # makes the Docker build fast and portable.
      - name: Patch package.json for production
        run: |
          node -e "
            const p = require('./memtrace/package.json');
            delete p.devDependencies;
            delete p.jest;
            const keepScripts = ['start', 'build:popup'];
            if (p.dependencies) {
              delete p.dependencies['node-llama-cpp'];
              delete p.dependencies['bytenode'];
              delete p.dependencies['javascript-obfuscator'];
            }
            p.scripts = Object.fromEntries(
              keepScripts.filter(s => p.scripts[s]).map(s => [s, p.scripts[s]])
            );
            require('fs').writeFileSync('./memtrace/package.json', JSON.stringify(p, null, 2));
          "
          echo "Stripped node-llama-cpp, bytenode, obfuscator from dependencies"

      # ── Log in to GitHub Container Registry ──────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build & push Docker image ────────────────────────────────────
      # Uses Dockerfile.prod — slim image with no build-essential packages
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./memtrace
          file: ./memtrace/docker/Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # ── Deploy to Alibaba SAS ────────────────────────────────────────
      - name: Deploy to Alibaba SAS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SAS_HOST }}
          username: ${{ secrets.SAS_USER }}
          key: ${{ secrets.SAS_SSH_KEY }}
          script: |
            set -e

            DEPLOY_DIR="/opt/memtrace"
            mkdir -p "$DEPLOY_DIR"

            # ── Write .env (create or update) ───────────────────────
            cat > "$DEPLOY_DIR/.env" << ENDENV
            # MemTrace Production — auto-generated by GitHub Actions
            LLM_PROVIDER=${{ vars.LLM_PROVIDER || 'qwen' }}
            LLM_MODEL=${{ vars.LLM_MODEL || 'qwen3-8b' }}
            EMB_PROVIDER=${{ vars.EMB_PROVIDER || 'qwen' }}
            API_KEY=${{ secrets.QWEN_API_KEY }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            CLOUDFLARE_TUNNEL_TOKEN=${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
            PORT=${{ vars.PORT || '3106' }}
            NODE_ENV=${{ vars.NODE_ENV || 'production' }}
            DB_TYPE=${{ vars.DB_TYPE || 'online' }}
            ONLINE_DB_PROVIDER=${{ vars.ONLINE_DB_PROVIDER || 'turso' }}
            TURSO_DATABASE_URL=${{ secrets.TURSO_DATABASE_URL }}
            TURSO_AUTH_TOKEN=${{ secrets.TURSO_AUTH_TOKEN }}
            LIMIT_MESH_MAX_AGENTS=${{ vars.LIMIT_MESH_MAX_AGENTS || '15' }}
            LIMIT_MESH_MIN_AGENTS=${{ vars.LIMIT_MESH_MIN_AGENTS || '4' }}
            LIMIT_MESH_MAX_TICKS=${{ vars.LIMIT_MESH_MAX_TICKS || '8' }}
            MT_AGENT_COUNT=${{ vars.MT_AGENT_COUNT || '10' }}
            MT_MAX_ROUNDS=${{ vars.MT_MAX_ROUNDS || '2' }}
            LLM_RPM=${{ vars.LLM_RPM || '30' }}
            LLM_MAX_CONCURRENT=${{ vars.LLM_MAX_CONCURRENT || '2' }}
            ADMIN_EMAILS=${{ vars.ADMIN_EMAILS || 'hazeezadebayo@gmail.com' }}
            ENRICHMENT_CHAR_LIMIT=${{ vars.ENRICHMENT_CHAR_LIMIT || '500' }}
            ENDENV

            echo ".env written"

            # ── Write docker-compose.prod.yml ─────────────────────────
            cat > "$DEPLOY_DIR/docker-compose.prod.yml" << 'ENDCOMPOSE'
            services:
              memtrace:
                image: ghcr.io/hazeezadebayo/memtrace-simulith:latest
                container_name: memtrace
                ports:
                  - "3000:3106"
                env_file:
                  - .env
                volumes:
                  - memtrace_data:/app/data
                restart: unless-stopped
                stop_grace_period: 30s
                mem_limit: 700m
                mem_reservation: 400m
                logging:
                  driver: "json-file"
                  options:
                    max-size: "10m"
                    max-file: "3"

              cloudflared:
                image: cloudflare/cloudflared:latest
                container_name: memtrace_cloudflared
                restart: unless-stopped
                env_file:
                  - .env
                command: tunnel --no-autoupdate run --token $CLOUDFLARE_TUNNEL_TOKEN
                depends_on:
                  - memtrace

            volumes:
              memtrace_data:
                driver: local
            ENDCOMPOSE

            echo "docker-compose.prod.yml written"

            # ── Deploy ───────────────────────────────────────────────
            cd "$DEPLOY_DIR"
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml down --remove-orphans 2>/dev/null || true
            docker compose -f docker-compose.prod.yml up -d

            # ── Health check ─────────────────────────────────────────
            echo "Waiting for health check..."
            for i in $(seq 1 30); do
              STATUS=$(curl -s http://localhost:3106/health 2>/dev/null || echo "")
              if echo "$STATUS" | grep -q '"ok"'; then
                echo "✅ Health check passed ($((i * 2))s)"
                exit 0
              fi
              sleep 2
            done

            echo "❌ Health check failed after 60s"
            docker compose -f docker-compose.prod.yml logs --tail=30 memtrace
            exit 1
