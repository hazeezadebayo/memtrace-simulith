# =============================================================================
# MemTrace — Automatic Deploy to Alibaba Cloud SAS
# =============================================================================
# Trigger: push to main → build Docker → push to GHCR → deploy to SAS
#
# Setup (one-time):
#   1. Generate an SSH key:  ssh-keygen -t ed25519 -f ~/.ssh/memtrace_deploy -N ""
#   2. Add pubkey to SAS:    ssh-copy-id -i ~/.ssh/memtrace_deploy.pub root@<SAS_IP>
#   3. In GitHub repo → Settings → Secrets and variables → Actions, add:
#      - SAS_HOST       — your SAS public IP
#      - SAS_USER       — root
#      - SAS_SSH_KEY    — content of ~/.ssh/memtrace_deploy (private key!)
#      - QWEN_API_KEY   — your Qwen DashScope API key
# =============================================================================

name: Deploy to Alibaba SAS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Patch: strip native modules from package.json ─────────────────
      # node-llama-cpp compiles C++ at install time, needs ~1GB+ RAM.
      # We use Qwen cloud API, so this is dead weight. Stripping it
      # makes the Docker build fast and portable.
      - name: Patch package.json for production
        run: |
          node -e "
            const p = require('./memtrace/package.json');
            delete p.devDependencies;
            delete p.jest;
            if (p.dependencies) {
              delete p.dependencies['node-llama-cpp'];
              delete p.dependencies['bytenode'];
              delete p.dependencies['javascript-obfuscator'];
              delete p.dependencies['esbuild'];
            }
            p.scripts = { start: p.scripts.start || 'node api/memtrace_server.js' };
            require('fs').writeFileSync('./memtrace/package.json', JSON.stringify(p, null, 2));
          "
          echo "Stripped node-llama-cpp, bytenode, obfuscator, esbuild from dependencies"

      # ── Log in to GitHub Container Registry ──────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build & push Docker image ────────────────────────────────────
      # Uses Dockerfile.prod — no build-essential packages (slimmer image)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./memtrace
          file: ./memtrace/docker/Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # ── Deploy to Alibaba SAS ────────────────────────────────────────
      - name: Deploy to Alibaba SAS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SAS_HOST }}
          username: ${{ secrets.SAS_USER }}
          key: ${{ secrets.SAS_SSH_KEY }}
          script: |
            set -e

            DEPLOY_DIR="/opt/memtrace"
            mkdir -p "$DEPLOY_DIR"

            # ── Write .env.prod (create or update) ──────────────────
            cat > "$DEPLOY_DIR/.env.prod" << ENDENV
            # MemTrace Production — auto-generated by GitHub Actions
            LLM_PROVIDER=qwen
            LLM_MODEL=qwen-turbo
            EMB_PROVIDER=qwen
            API_KEY=${{ secrets.QWEN_API_KEY }}
            PORT=3106
            NODE_ENV=production
            DB_TYPE=offline
            DB_PATH=data/memtrace.sqlite
            LIMIT_MESH_MAX_AGENTS=15
            LIMIT_MESH_MIN_AGENTS=4
            LIMIT_MESH_MAX_TICKS=8
            MT_AGENT_COUNT=10
            MT_MAX_ROUNDS=2
            LLM_RPM=30
            LLM_MAX_CONCURRENT=2
            ENDENV

            echo ".env.prod written"

            # ── Write docker-compose.yml ─────────────────────────────
            cat > "$DEPLOY_DIR/docker-compose.yml" << 'ENDCOMPOSE'
            services:
              api:
                image: ghcr.io/hazeezadebayo/memtrace:latest
                container_name: memtrace_api
                ports:
                  - "3000:3106"
                env_file:
                  - .env.prod
                volumes:
                  - memtrace_data:/app/data
                restart: unless-stopped
                stop_grace_period: 30s
                mem_limit: 700m
                mem_reservation: 400m
                healthcheck:
                  test: ["CMD", "node", "-e", "require('http').get('http://localhost:3106/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 60s
                logging:
                  driver: "json-file"
                  options:
                    max-size: "10m"
                    max-file: "3"

            volumes:
              memtrace_data:
                driver: local
            ENDCOMPOSE

            echo "docker-compose.yml written"

            # ── Deploy ───────────────────────────────────────────────
            cd "$DEPLOY_DIR"
            docker compose pull
            docker compose down --remove-orphans 2>/dev/null || true
            docker compose up -d

            # ── Health check ─────────────────────────────────────────
            echo "Waiting for health check..."
            for i in $(seq 1 30); do
              STATUS=$(curl -s http://localhost:3106/health 2>/dev/null || echo "")
              if echo "$STATUS" | grep -q '"ok"'; then
                echo "✅ Health check passed ($((i * 2))s)"
                exit 0
              fi
              sleep 2
            done

            echo "❌ Health check failed after 60s"
            docker compose logs --tail=30 api
            exit 1
